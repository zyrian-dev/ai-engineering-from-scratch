<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e8f1fb; stroke: #2471a3; stroke-width: 1.5; }
      .label { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
      .content { font-size: 12px; fill: #333; font-family: 'Menlo', monospace; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="450" y="30" text-anchor="middle" class="title">three ways to close the reality gap</text>

  <rect x="40" y="60" width="820" height="70" class="hot"/>
  <text x="60" y="85" class="label">the reality gap</text>
  <text x="60" y="108" class="content">sim physics approx = real physics + epsilon  (friction, delay, lighting, noise, ...)</text>

  <rect x="40" y="150" width="260" height="240" class="box"/>
  <text x="170" y="178" text-anchor="middle" class="label">domain randomization</text>
  <text x="60" y="205" class="content">theta_sim ~ P(theta)</text>
  <text x="60" y="225" class="content">train over many sims</text>
  <text x="60" y="245" class="content">policy sees random gravity,</text>
  <text x="60" y="265" class="content">mass, friction, motor gain</text>
  <text x="170" y="300" text-anchor="middle" class="caption">zero real data needed</text>
  <text x="170" y="320" text-anchor="middle" class="caption">OpenAI Dactyl (rubik's cube)</text>
  <text x="170" y="345" text-anchor="middle" class="caption">over-rand. -&gt; cautious</text>
  <text x="170" y="365" text-anchor="middle" class="caption">under-rand. -&gt; brittle</text>

  <rect x="320" y="150" width="260" height="240" class="cool"/>
  <text x="450" y="178" text-anchor="middle" class="label">system identification</text>
  <text x="340" y="205" class="content">measure real:</text>
  <text x="340" y="225" class="content">  friction, delays, gains</text>
  <text x="340" y="245" class="content">plug into sim</text>
  <text x="340" y="265" class="content">train on matched sim</text>
  <text x="450" y="300" text-anchor="middle" class="caption">low noise, precise</text>
  <text x="450" y="320" text-anchor="middle" class="caption">but residual error invisible</text>
  <text x="450" y="345" text-anchor="middle" class="caption">to the policy</text>

  <rect x="600" y="150" width="260" height="240" class="box"/>
  <text x="730" y="178" text-anchor="middle" class="label">teacher / student</text>
  <text x="620" y="205" class="content">teacher: privileged info</text>
  <text x="620" y="225" class="content">  terrain, ground truth</text>
  <text x="620" y="245" class="content">student: only sensor obs</text>
  <text x="620" y="265" class="content">distill teacher -&gt; student</text>
  <text x="730" y="300" text-anchor="middle" class="caption">ANYmal, Boston Dynamics</text>
  <text x="730" y="320" text-anchor="middle" class="caption">robust across physical</text>
  <text x="730" y="345" text-anchor="middle" class="caption">parameters + obs noise</text>

  <text x="450" y="435" text-anchor="middle" class="caption">2026 recipe: GPU-parallel sim + DR + teacher/student + safety shield on real hardware</text>
</svg>
