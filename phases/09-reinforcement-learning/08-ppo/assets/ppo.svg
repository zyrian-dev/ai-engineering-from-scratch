<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e8f1fb; stroke: #2471a3; stroke-width: 1.5; }
      .axis { stroke: #1a1a1a; stroke-width: 1.2; fill: none; }
      .curve-good { stroke: #2471a3; stroke-width: 2.2; fill: none; }
      .curve-bad { stroke: #c0392b; stroke-width: 2.2; fill: none; }
      .label { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
      .content { font-size: 12px; fill: #333; font-family: 'Menlo', monospace; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="450" y="30" text-anchor="middle" class="title">PPO clipped surrogate: flat roof, flat floor</text>

  <rect x="40" y="60" width="820" height="60" class="box"/>
  <text x="60" y="85" class="label">L^{CLIP}(theta) = E[ min( r A,  clip(r, 1-eps, 1+eps) * A ) ]</text>
  <text x="60" y="105" class="content">r = pi_theta(a|s) / pi_old(a|s)       typical eps = 0.2</text>

  <rect x="40" y="140" width="380" height="260" class="box"/>
  <text x="230" y="165" text-anchor="middle" class="label">advantage A &gt; 0 (good action)</text>

  <line x1="80" y1="370" x2="400" y2="370" class="axis"/>
  <line x1="240" y1="180" x2="240" y2="380" class="axis"/>
  <text x="410" y="374" class="content">r</text>
  <text x="250" y="186" class="content">L</text>

  <polyline points="80,340 180,310 240,290 290,275" class="curve-good"/>
  <polyline points="290,275 400,275" class="curve-good" stroke-dasharray="5,3"/>

  <line x1="290" y1="180" x2="290" y2="380" stroke="#c0392b" stroke-dasharray="3,3"/>
  <text x="290" y="395" text-anchor="middle" class="caption">r = 1+eps</text>
  <text x="240" y="395" text-anchor="middle" class="caption">r = 1</text>

  <text x="350" y="263" text-anchor="middle" class="caption">clip: flat roof</text>
  <text x="150" y="320" text-anchor="middle" class="caption">gradient flows</text>

  <rect x="480" y="140" width="380" height="260" class="box"/>
  <text x="670" y="165" text-anchor="middle" class="label">advantage A &lt; 0 (bad action)</text>

  <line x1="520" y1="250" x2="840" y2="250" class="axis"/>
  <line x1="680" y1="180" x2="680" y2="380" class="axis"/>
  <text x="850" y="254" class="content">r</text>
  <text x="690" y="186" class="content">L</text>

  <polyline points="520,260 600,260" class="curve-bad" stroke-dasharray="5,3"/>
  <polyline points="600,260 680,270 750,295 840,330" class="curve-bad"/>

  <line x1="600" y1="180" x2="600" y2="380" stroke="#2471a3" stroke-dasharray="3,3"/>
  <text x="600" y="395" text-anchor="middle" class="caption">r = 1-eps</text>
  <text x="680" y="395" text-anchor="middle" class="caption">r = 1</text>

  <text x="560" y="248" text-anchor="middle" class="caption">clip: flat floor</text>
  <text x="780" y="300" text-anchor="middle" class="caption">gradient flows</text>

  <text x="450" y="440" text-anchor="middle" class="caption">if the ratio drifts past the clip in the "useful" direction, gradient goes to zero — no unbounded updates</text>
</svg>
