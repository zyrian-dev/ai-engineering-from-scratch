<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e8f1fb; stroke: #2471a3; stroke-width: 1.5; }
      .label { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
      .content { font-size: 12px; fill: #333; font-family: 'Menlo', monospace; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="450" y="30" text-anchor="middle" class="title">Q-learning vs SARSA — one line of code apart</text>

  <rect x="40" y="60" width="820" height="70" class="box"/>
  <text x="60" y="85" class="label">the transition</text>
  <text x="60" y="108" class="content">(s, a) --env.step--&gt; (r, s')   (one step, online, no episode boundary needed)</text>

  <rect x="40" y="150" width="400" height="180" class="hot"/>
  <text x="240" y="175" text-anchor="middle" class="label">Q-learning (off-policy)</text>
  <text x="60" y="205" class="content">target = r + gamma * max_{a'} Q(s', a')</text>
  <text x="60" y="228" class="content">Q(s, a) += alpha * (target - Q(s, a))</text>
  <text x="60" y="260" class="caption">assumes greedy policy from s' onward</text>
  <text x="60" y="278" class="caption">learns Q* even while exploring</text>
  <text x="60" y="300" class="caption">max bias: overestimates noisy Q</text>
  <text x="60" y="320" class="caption">deep version: DQN</text>

  <rect x="460" y="150" width="400" height="180" class="cool"/>
  <text x="660" y="175" text-anchor="middle" class="label">SARSA (on-policy)</text>
  <text x="480" y="205" class="content">a' = epsilon_greedy(Q, s')</text>
  <text x="480" y="228" class="content">target = r + gamma * Q(s', a')</text>
  <text x="480" y="251" class="content">Q(s, a) += alpha * (target - Q(s, a))</text>
  <text x="480" y="283" class="caption">uses the ACTION actually taken</text>
  <text x="480" y="301" class="caption">learns Q^pi for current epsilon-greedy</text>
  <text x="480" y="319" class="caption">conservative near cliffs / danger</text>

  <rect x="40" y="350" width="820" height="70" class="box"/>
  <text x="450" y="375" text-anchor="middle" class="label">same shape: target - Q(s,a), scaled by alpha</text>
  <text x="450" y="398" text-anchor="middle" class="caption">the ONE symbol difference: max vs sampled a' — off-policy vs on-policy</text>

  <text x="450" y="450" text-anchor="middle" class="caption">everything in Phase 9 after this lesson is deep-function-approximated variants of these two updates</text>
</svg>
