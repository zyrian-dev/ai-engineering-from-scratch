<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e8f1fb; stroke: #2471a3; stroke-width: 1.5; }
      .label { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
      .content { font-size: 12px; fill: #333; font-family: 'Menlo', monospace; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="450" y="30" text-anchor="middle" class="title">DQN: Q-learning + replay + target network</text>

  <rect x="40" y="60" width="200" height="110" class="box"/>
  <text x="140" y="88" text-anchor="middle" class="label">environment</text>
  <text x="140" y="112" text-anchor="middle" class="content">(s, a) -&gt; (r, s')</text>
  <text x="140" y="135" text-anchor="middle" class="caption">Atari, GridWorld, whatever</text>

  <rect x="280" y="60" width="200" height="110" class="hot"/>
  <text x="380" y="88" text-anchor="middle" class="label">online net Q(.; theta)</text>
  <text x="380" y="112" text-anchor="middle" class="content">acts epsilon-greedy</text>
  <text x="380" y="135" text-anchor="middle" class="content">trained every step</text>

  <rect x="520" y="60" width="200" height="110" class="box"/>
  <text x="620" y="88" text-anchor="middle" class="label">replay buffer D</text>
  <text x="620" y="112" text-anchor="middle" class="content">(s, a, r, s', done)</text>
  <text x="620" y="135" text-anchor="middle" class="caption">~1M transitions, uniform sample</text>

  <rect x="760" y="60" width="100" height="110" class="cool"/>
  <text x="810" y="88" text-anchor="middle" class="label">target</text>
  <text x="810" y="112" text-anchor="middle" class="label">theta^-</text>
  <text x="810" y="140" text-anchor="middle" class="caption">frozen</text>
  <text x="810" y="155" text-anchor="middle" class="caption">sync/C</text>

  <line x1="240" y1="115" x2="278" y2="115" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="115" x2="518" y2="115" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="720" y1="115" x2="758" y2="115" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,3"/>

  <rect x="40" y="210" width="820" height="150" class="box"/>
  <text x="450" y="235" text-anchor="middle" class="label">gradient step: one minibatch, TD squared error</text>
  <text x="60" y="265" class="content">for (s, a, r, s', done) in buffer.sample(batch):</text>
  <text x="60" y="285" class="content">   y = r                             if done</text>
  <text x="60" y="305" class="content">   y = r + gamma * max_a' Q(s', a'; theta^-)    otherwise</text>
  <text x="60" y="325" class="content">   loss = (Q(s, a; theta) - y)^2</text>
  <text x="60" y="345" class="content">   theta -= lr * d loss / d theta</text>

  <path d="M 380 360 Q 380 400 140 400 Q 140 175 140 170" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="250" y="414" class="caption">updated theta acts next step</text>

  <text x="450" y="448" text-anchor="middle" class="caption">three tricks, one loss, one neural net: the deep RL era begins</text>
</svg>
