<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .dsk { fill: #e9e6ff; stroke: #5a4fcf; stroke-width: 1.5; }
      .old { fill: #eeeeee; stroke: #888; stroke-width: 1.2; }
      .label { font-size: 13px; font-weight: 600; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="480" y="24" text-anchor="middle" class="title">DeepSeek-V3 anatomy — 671B total, 37B active</text>

  <!-- stack -->
  <rect x="60" y="50" width="300" height="500" class="box"/>
  <text x="210" y="72" text-anchor="middle" class="head">full stack (61 blocks)</text>

  <rect x="80" y="88" width="260" height="36" class="cool"/>
  <text x="210" y="110" text-anchor="middle" class="step">embedding (129k x 7168)</text>

  <rect x="80" y="130" width="260" height="42" class="old"/>
  <text x="210" y="148" text-anchor="middle" class="step">3 dense blocks</text>
  <text x="210" y="164" text-anchor="middle" class="small">MLA attention + dense SwiGLU MLP (18432)</text>

  <rect x="80" y="180" width="260" height="232" class="dsk"/>
  <text x="210" y="200" text-anchor="middle" class="step">58 MoE blocks</text>
  <text x="210" y="220" text-anchor="middle" class="small">MLA attention + MoE MLP</text>
  <text x="210" y="242" text-anchor="middle" class="small">256 experts (2048 hidden each)</text>
  <text x="210" y="262" text-anchor="middle" class="small">+ 1 shared expert (always on)</text>
  <text x="210" y="282" text-anchor="middle" class="small">router: aux-loss-free bias</text>
  <text x="210" y="302" text-anchor="middle" class="small">top-8 routing per token</text>
  <text x="210" y="324" text-anchor="middle" class="small">active per token:</text>
  <text x="210" y="340" text-anchor="middle" class="small">8 routed + 1 shared = 9 experts</text>
  <text x="210" y="362" text-anchor="middle" class="small">KV cache: 512-dim MLA latent</text>
  <text x="210" y="382" text-anchor="middle" class="small">per token per layer</text>

  <rect x="80" y="420" width="260" height="36" class="hot"/>
  <text x="210" y="442" text-anchor="middle" class="step">1 MTP module</text>

  <rect x="80" y="462" width="260" height="36" class="cool"/>
  <text x="210" y="484" text-anchor="middle" class="step">final RMSNorm + LM head (tied)</text>

  <text x="210" y="530" text-anchor="middle" class="caption">total 671B · active 37B · ratio 5.5%</text>

  <!-- Innovation callouts -->
  <rect x="400" y="50" width="520" height="500" class="box"/>
  <text x="660" y="72" text-anchor="middle" class="head">four DeepSeek innovations</text>

  <rect x="420" y="92" width="480" height="80" class="cool"/>
  <text x="440" y="114" class="step">1 / MLA — Multi-Head Latent Attention</text>
  <text x="440" y="134" class="small">compress K and V into shared 512-dim latent c^{KV};</text>
  <text x="440" y="150" class="small">KV cache stores 512 floats/token/layer instead of 2 * heads * head_dim.</text>
  <text x="440" y="166" class="small">at 128k: 7.6 GB vs 30.5 GB for GQA(8/128). 4x savings.</text>

  <rect x="420" y="180" width="480" height="80" class="hot"/>
  <text x="440" y="202" class="step">2 / MTP — Multi-Token Prediction</text>
  <text x="440" y="222" class="small">D=1 module predicts t+2 from h^(1) + E(t+1).</text>
  <text x="440" y="238" class="small">denser training signal at 2.1% param overhead (14B of 671B).</text>
  <text x="440" y="254" class="small">at inference: 80%+ acceptance as speculative-decoding draft.</text>

  <rect x="420" y="268" width="480" height="80" class="cold"/>
  <text x="440" y="290" class="step">3 / aux-loss-free routing</text>
  <text x="440" y="310" class="small">per-expert bias terms adjusted during training</text>
  <text x="440" y="326" class="small">to balance load — no auxiliary loss term needed.</text>
  <text x="440" y="342" class="small">same effect, cleaner objective.</text>

  <rect x="420" y="356" width="480" height="80" class="dsk"/>
  <text x="440" y="378" class="step">4 / DualPipe training</text>
  <text x="440" y="398" class="small">bidirectional pipeline overlap on 2k H800 GPUs.</text>
  <text x="440" y="414" class="small">hides cross-node all-to-all inside compute windows.</text>
  <text x="440" y="430" class="small">recovers ~245k GPU-hours vs 1F1B at V3's scale.</text>

  <rect x="420" y="444" width="480" height="100" class="box"/>
  <text x="440" y="466" class="step">what this unlocks</text>
  <text x="440" y="484" class="small">· 128k context with a manageable KV cache (MLA)</text>
  <text x="440" y="500" class="small">· larger capacity for same active FLOP budget (256 experts, top-8)</text>
  <text x="440" y="516" class="small">· 1.8x decode throughput free (MTP as spec-decode draft)</text>
  <text x="440" y="532" class="small">· 95%+ GPU utilization at 2k-rank training (DualPipe)</text>
</svg>
