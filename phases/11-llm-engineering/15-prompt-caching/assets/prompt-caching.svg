<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .write { fill: #ffe0cc; stroke: #c0392b; stroke-width: 1.5; }
      .read { fill: #e0f2e0; stroke: #2d7a2d; stroke-width: 1.5; }
      .miss { fill: #eee; stroke: #666; stroke-width: 1.2; }
      .label { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
      .sub { font-size: 12px; fill: #333; }
      .mono { font-size: 11px; fill: #333; font-family: 'Menlo', monospace; }
      .tag { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .line { stroke: #1a1a1a; stroke-width: 1.3; fill: none; }
      .dash { stroke: #666; stroke-width: 1; fill: none; stroke-dasharray: 4 3; }
    </style>
  </defs>

  <text x="450" y="30" text-anchor="middle" class="title">prompt caching: one write, many reads</text>

  <!-- Request 1 -->
  <text x="60" y="80" class="label">Request 1</text>
  <rect x="60" y="95" width="500" height="40" class="write"/>
  <text x="310" y="120" text-anchor="middle" class="sub">[system + tools + few-shot]  15,000 tok  (CACHE WRITE)</text>
  <rect x="560" y="95" width="140" height="40" class="box"/>
  <text x="630" y="120" text-anchor="middle" class="sub">[user msg] 400 tok</text>
  <text x="720" y="120" class="mono">bill: 15,000 * 1.25x + 400 * 1x</text>

  <!-- Request 2 -->
  <text x="60" y="170" class="label">Request 2</text>
  <rect x="60" y="185" width="500" height="40" class="read"/>
  <text x="310" y="210" text-anchor="middle" class="sub">[same prefix]  15,000 tok  (CACHE READ)</text>
  <rect x="560" y="185" width="140" height="40" class="box"/>
  <text x="630" y="210" text-anchor="middle" class="sub">[user msg] 400 tok</text>
  <text x="720" y="210" class="mono">bill: 15,000 * 0.1x + 400 * 1x</text>

  <!-- Request N -->
  <text x="60" y="260" class="label">Request N</text>
  <rect x="60" y="275" width="500" height="40" class="read"/>
  <text x="310" y="300" text-anchor="middle" class="sub">[same prefix]  15,000 tok  (CACHE READ)</text>
  <rect x="560" y="275" width="140" height="40" class="box"/>
  <text x="630" y="300" text-anchor="middle" class="sub">[user msg] 400 tok</text>
  <text x="720" y="300" class="mono">bill: 15,000 * 0.1x + 400 * 1x</text>

  <!-- BAD example -->
  <path d="M60 340 L840 340" class="dash"/>
  <text x="60" y="370" class="label">Anti-pattern: timestamp at the top</text>
  <rect x="60" y="385" width="140" height="40" class="miss"/>
  <text x="130" y="410" text-anchor="middle" class="mono">"15:30:02"</text>
  <rect x="200" y="385" width="360" height="40" class="miss"/>
  <text x="380" y="410" text-anchor="middle" class="sub">[rest of prefix]  still 15,000 tok</text>
  <rect x="560" y="385" width="140" height="40" class="box"/>
  <text x="630" y="410" text-anchor="middle" class="sub">[user msg]</text>
  <text x="720" y="410" class="mono">every request MISSES: no shared prefix</text>

  <text x="450" y="460" text-anchor="middle" class="tag">
    break-even: Anthropic pays back after the 2nd read; 1h TTL costs 2x write but reuses 12x longer.
  </text>
</svg>
