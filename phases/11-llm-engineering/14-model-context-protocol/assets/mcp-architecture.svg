<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .host { fill: #e8f0ff; stroke: #0f3460; stroke-width: 1.5; }
      .server { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .primitive { fill: #e8f7e8; stroke: #2d7a2d; stroke-width: 1.2; }
      .label { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
      .sub { font-size: 12px; fill: #333; }
      .tag { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .line { stroke: #1a1a1a; stroke-width: 1.3; fill: none; }
    </style>
  </defs>

  <text x="450" y="30" text-anchor="middle" class="title">one host, one JSON-RPC session, three primitives</text>

  <!-- Host -->
  <rect x="40" y="70" width="240" height="300" class="host"/>
  <text x="160" y="95" text-anchor="middle" class="label">Host (LLM app)</text>
  <text x="160" y="113" text-anchor="middle" class="tag">Claude Desktop / Claude Code / ChatGPT</text>

  <rect x="70" y="135" width="180" height="55" class="box"/>
  <text x="160" y="155" text-anchor="middle" class="sub">LLM runtime</text>
  <text x="160" y="175" text-anchor="middle" class="tag">model + prompt + context</text>

  <rect x="70" y="205" width="180" height="55" class="box"/>
  <text x="160" y="225" text-anchor="middle" class="sub">MCP client</text>
  <text x="160" y="245" text-anchor="middle" class="tag">one per server mounted</text>

  <rect x="70" y="275" width="180" height="55" class="box"/>
  <text x="160" y="295" text-anchor="middle" class="sub">user UI / approval</text>
  <text x="160" y="315" text-anchor="middle" class="tag">slash commands, confirms</text>

  <!-- Wire -->
  <path d="M280 235 L500 235" class="line" marker-end="url(#arrow)"/>
  <text x="390" y="220" text-anchor="middle" class="tag">JSON-RPC 2.0 (stdio / HTTP)</text>
  <text x="390" y="252" text-anchor="middle" class="tag">initialize &#x2192; list &#x2192; call</text>

  <!-- Server -->
  <rect x="500" y="70" width="360" height="300" class="server"/>
  <text x="680" y="95" text-anchor="middle" class="label">Server</text>
  <text x="680" y="113" text-anchor="middle" class="tag">your code: FastMCP / SDK / custom</text>

  <rect x="525" y="140" width="310" height="60" class="primitive"/>
  <text x="680" y="161" text-anchor="middle" class="sub">Tools</text>
  <text x="680" y="181" text-anchor="middle" class="tag">functions the model calls; JSON Schema input</text>

  <rect x="525" y="215" width="310" height="60" class="primitive"/>
  <text x="680" y="236" text-anchor="middle" class="sub">Resources</text>
  <text x="680" y="256" text-anchor="middle" class="tag">URI-addressed read-only content</text>

  <rect x="525" y="290" width="310" height="60" class="primitive"/>
  <text x="680" y="311" text-anchor="middle" class="sub">Prompts</text>
  <text x="680" y="331" text-anchor="middle" class="tag">user-invoked templates (slash commands)</text>

  <!-- Caption -->
  <text x="450" y="410" text-anchor="middle" class="tag">
    spec revision 2025-06-18 adds streamable HTTP transport; every host/server pins a protocol version in initialize.
  </text>
  <text x="450" y="435" text-anchor="middle" class="tag">
    destructive tools set destructiveHint: true so the host can gate on human approval.
  </text>
</svg>
