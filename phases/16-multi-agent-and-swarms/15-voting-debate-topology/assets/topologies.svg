<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
      .small { font-size: 10px; font-family: 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .node { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hub { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.8; }
      .edge { stroke: #1a1a1a; stroke-width: 1; fill: none; }
    </style>
  </defs>
  <text x="480" y="28" text-anchor="middle" class="title">Multi-agent debate topologies — MultiAgentBench (ACL 2025)</text>

  <rect x="40" y="60" width="210" height="220" class="box"/>
  <text x="145" y="84" text-anchor="middle" class="head">star</text>
  <circle cx="145" cy="140" r="24" class="hub"/>
  <text x="145" y="144" text-anchor="middle" class="small">hub</text>
  <circle cx="80" cy="200" r="20" class="node"/>
  <circle cx="145" cy="220" r="20" class="node"/>
  <circle cx="210" cy="200" r="20" class="node"/>
  <line x1="145" y1="164" x2="85" y2="185" class="edge"/>
  <line x1="145" y1="164" x2="145" y2="200" class="edge"/>
  <line x1="145" y1="164" x2="205" y2="185" class="edge"/>
  <text x="145" y="260" text-anchor="middle" class="caption">fast-factual wins here</text>

  <rect x="270" y="60" width="210" height="220" class="box"/>
  <text x="375" y="84" text-anchor="middle" class="head">chain</text>
  <circle cx="300" cy="170" r="20" class="node"/>
  <circle cx="345" cy="170" r="20" class="node"/>
  <circle cx="390" cy="170" r="20" class="node"/>
  <circle cx="435" cy="170" r="20" class="node"/>
  <line x1="320" y1="170" x2="325" y2="170" class="edge" marker-end="url(#arrow)"/>
  <line x1="365" y1="170" x2="370" y2="170" class="edge" marker-end="url(#arrow)"/>
  <line x1="410" y1="170" x2="415" y2="170" class="edge" marker-end="url(#arrow)"/>
  <text x="375" y="260" text-anchor="middle" class="caption">stepwise refinement</text>

  <rect x="500" y="60" width="210" height="220" class="box"/>
  <text x="605" y="84" text-anchor="middle" class="head">tree</text>
  <circle cx="605" cy="120" r="20" class="node"/>
  <circle cx="555" cy="180" r="18" class="node"/>
  <circle cx="655" cy="180" r="18" class="node"/>
  <circle cx="530" cy="230" r="16" class="node"/>
  <circle cx="580" cy="230" r="16" class="node"/>
  <circle cx="630" cy="230" r="16" class="node"/>
  <circle cx="680" cy="230" r="16" class="node"/>
  <line x1="605" y1="140" x2="560" y2="165" class="edge"/>
  <line x1="605" y1="140" x2="650" y2="165" class="edge"/>
  <line x1="555" y1="198" x2="530" y2="215" class="edge"/>
  <line x1="555" y1="198" x2="580" y2="215" class="edge"/>
  <line x1="655" y1="198" x2="630" y2="215" class="edge"/>
  <line x1="655" y1="198" x2="680" y2="215" class="edge"/>
  <text x="605" y="260" text-anchor="middle" class="caption">hierarchical, divide-and-conquer</text>

  <rect x="730" y="60" width="210" height="220" class="box"/>
  <text x="835" y="84" text-anchor="middle" class="head">graph</text>
  <circle cx="800" cy="130" r="20" class="node"/>
  <circle cx="870" cy="130" r="20" class="node"/>
  <circle cx="800" cy="210" r="20" class="node"/>
  <circle cx="870" cy="210" r="20" class="node"/>
  <line x1="820" y1="130" x2="850" y2="130" class="edge"/>
  <line x1="820" y1="210" x2="850" y2="210" class="edge"/>
  <line x1="800" y1="150" x2="800" y2="190" class="edge"/>
  <line x1="870" y1="150" x2="870" y2="190" class="edge"/>
  <line x1="820" y1="150" x2="850" y2="190" class="edge"/>
  <line x1="850" y1="150" x2="820" y2="190" class="edge"/>
  <text x="835" y="260" text-anchor="middle" class="caption">research wins here</text>

  <rect x="40" y="310" width="900" height="150" class="cool"/>
  <text x="490" y="334" text-anchor="middle" class="head">measured results from MultiAgentBench (MARBLE, ACL 2025)</text>
  <text x="70" y="362" class="small">graph best for research; +3% milestone achievement over next-best topology</text>
  <text x="70" y="382" class="small">coordination tax: past ~4 agents, wall-clock and token cost grow faster than accuracy</text>
  <text x="70" y="402" class="small">heterogeneity (different base models) consistently beats adding more homogeneous agents</text>
  <text x="70" y="422" class="small">bounded rounds (2-3) matter: unbounded debate rewards conformity, not correctness</text>
  <text x="70" y="442" class="small">star is the cost sweet spot when the hub is high-capability and workers are cheap</text>
</svg>
