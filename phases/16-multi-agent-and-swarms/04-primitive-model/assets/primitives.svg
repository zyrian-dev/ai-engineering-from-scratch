<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .dsk { fill: #e9e6ff; stroke: #5a4fcf; stroke-width: 1.5; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
    </style>
  </defs>
  <text x="480" y="28" text-anchor="middle" class="title">Four primitives — every 2026 multi-agent framework fits this shape</text>

  <rect x="40" y="60" width="220" height="180" class="cool"/>
  <text x="150" y="82" text-anchor="middle" class="head">Agent</text>
  <text x="150" y="108" text-anchor="middle" class="step">system_prompt + tools</text>
  <text x="150" y="128" text-anchor="middle" class="small">stateless function</text>
  <text x="150" y="146" text-anchor="middle" class="small">of (prompt, tools, model)</text>
  <text x="150" y="174" text-anchor="middle" class="small">AutoGen: ConversableAgent</text>
  <text x="150" y="190" text-anchor="middle" class="small">CrewAI: role + goal + backstory</text>
  <text x="150" y="206" text-anchor="middle" class="small">LangGraph: node function</text>
  <text x="150" y="222" text-anchor="middle" class="small">Swarm: Agent(instructions, tools)</text>

  <rect x="280" y="60" width="220" height="180" class="hot"/>
  <text x="390" y="82" text-anchor="middle" class="head">Handoff</text>
  <text x="390" y="108" text-anchor="middle" class="step">transfer of control</text>
  <text x="390" y="128" text-anchor="middle" class="small">three implementations:</text>
  <text x="390" y="148" text-anchor="middle" class="small">1 function return (Swarm)</text>
  <text x="390" y="166" text-anchor="middle" class="small">2 graph edge (LangGraph)</text>
  <text x="390" y="184" text-anchor="middle" class="small">3 speaker selection (AutoGen)</text>
  <text x="390" y="210" text-anchor="middle" class="caption">always: (from, to, optional payload)</text>

  <rect x="520" y="60" width="220" height="180" class="cold"/>
  <text x="630" y="82" text-anchor="middle" class="head">Shared state</text>
  <text x="630" y="108" text-anchor="middle" class="step">the ONLY stateful thing</text>
  <text x="630" y="128" text-anchor="middle" class="small">message pool</text>
  <text x="630" y="146" text-anchor="middle" class="small">blackboard</text>
  <text x="630" y="164" text-anchor="middle" class="small">StateGraph reducer</text>
  <text x="630" y="182" text-anchor="middle" class="small">MCP shared context</text>
  <text x="630" y="210" text-anchor="middle" class="caption">memory poisoning lives here</text>

  <rect x="760" y="60" width="180" height="180" class="dsk"/>
  <text x="850" y="82" text-anchor="middle" class="head">Orchestrator</text>
  <text x="850" y="108" text-anchor="middle" class="step">who speaks next</text>
  <text x="850" y="128" text-anchor="middle" class="small">static graph</text>
  <text x="850" y="146" text-anchor="middle" class="small">LLM-selected</text>
  <text x="850" y="164" text-anchor="middle" class="small">handoff-driven</text>
  <text x="850" y="182" text-anchor="middle" class="small">queue-driven</text>
  <text x="850" y="210" text-anchor="middle" class="caption">scheduler over the other three</text>

  <rect x="40" y="280" width="900" height="210" class="box"/>
  <text x="490" y="304" text-anchor="middle" class="head">mapping the 2026 frameworks onto the four axes</text>

  <text x="60" y="336" class="step">OpenAI Swarm / Agents SDK</text>
  <text x="340" y="336" class="small">agent = Agent(instructions, tools)</text>
  <text x="340" y="352" class="small">handoff = tool returns Agent · shared state pushed to caller · orchestrator = LLM's handoff call</text>

  <text x="60" y="376" class="step">AutoGen v0.4 / AG2</text>
  <text x="340" y="376" class="small">agent = ConversableAgent</text>
  <text x="340" y="392" class="small">handoff = speaker selection · shared state = message pool · orchestrator = selector fn (LLM or round-robin)</text>

  <text x="60" y="416" class="step">CrewAI</text>
  <text x="340" y="416" class="small">agent = role + goal + backstory</text>
  <text x="340" y="432" class="small">handoff = Process.Sequential / Hierarchical · shared state = Task outputs · orchestrator = manager LLM</text>

  <text x="60" y="456" class="step">LangGraph</text>
  <text x="340" y="456" class="small">agent = node function</text>
  <text x="340" y="472" class="small">handoff = graph edge · shared state = StateGraph reducer · orchestrator = the graph (deterministic)</text>
</svg>
