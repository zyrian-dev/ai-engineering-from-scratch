<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .dsk { fill: #e9e6ff; stroke: #5a4fcf; stroke-width: 1.5; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .edge { stroke: #1a1a1a; stroke-width: 1.2; fill: none; }
    </style>
  </defs>
  <text x="450" y="28" text-anchor="middle" class="title">Group chat — shared pool + speaker selector (AutoGen / AG2)</text>

  <rect x="220" y="60" width="460" height="80" class="cold"/>
  <text x="450" y="82" text-anchor="middle" class="head">shared message pool</text>
  <text x="450" y="104" text-anchor="middle" class="small">m1 [coder]: initial code ... | m2 [reviewer]: bug detected ... | m3 [coder]: revised ... | m4 [reviewer]: approved</text>
  <text x="450" y="122" text-anchor="middle" class="small">every agent reads every message</text>

  <rect x="40" y="180" width="140" height="80" class="hot"/>
  <text x="110" y="202" text-anchor="middle" class="head">Coder</text>
  <text x="110" y="222" text-anchor="middle" class="small">writes code</text>
  <text x="110" y="240" text-anchor="middle" class="small">revises on review</text>

  <rect x="220" y="180" width="140" height="80" class="cool"/>
  <text x="290" y="202" text-anchor="middle" class="head">Reviewer</text>
  <text x="290" y="222" text-anchor="middle" class="small">critiques code</text>
  <text x="290" y="240" text-anchor="middle" class="small">returns approved / rejected</text>

  <rect x="400" y="180" width="140" height="80" class="dsk"/>
  <text x="470" y="202" text-anchor="middle" class="head">Manager</text>
  <text x="470" y="222" text-anchor="middle" class="small">drives termination</text>
  <text x="470" y="240" text-anchor="middle" class="small">emits TERMINATE</text>

  <rect x="580" y="180" width="260" height="80" class="box"/>
  <text x="710" y="202" text-anchor="middle" class="head">Selector</text>
  <text x="710" y="222" text-anchor="middle" class="small">round-robin (fixed cycle)</text>
  <text x="710" y="240" text-anchor="middle" class="small">LLM-selected (context-aware)</text>
  <text x="710" y="256" text-anchor="middle" class="small">custom (rule-based fallback)</text>

  <line x1="110" y1="180" x2="350" y2="140" class="edge" marker-end="url(#arrow)"/>
  <line x1="290" y1="180" x2="440" y2="140" class="edge" marker-end="url(#arrow)"/>
  <line x1="470" y1="180" x2="520" y2="140" class="edge" marker-end="url(#arrow)"/>

  <line x1="450" y1="140" x2="580" y2="200" class="edge" marker-end="url(#arrow)"/>
  <text x="555" y="168" class="small">selector reads pool</text>

  <path d="M 710 260 Q 710 320 470 300" class="edge" fill="none" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="580" y="300" class="small">selector returns: next speaker = manager</text>

  <rect x="40" y="340" width="380" height="150" class="box"/>
  <text x="230" y="362" text-anchor="middle" class="head">when group chat fits</text>
  <text x="230" y="384" text-anchor="middle" class="small">emergent conversations, role-mixing</text>
  <text x="230" y="402" text-anchor="middle" class="small">exploratory problem-solving</text>
  <text x="230" y="420" text-anchor="middle" class="small">pre-wiring every handoff is wrong</text>
  <text x="230" y="440" text-anchor="middle" class="small">"brainstorm meeting" not "assembly line"</text>
  <text x="230" y="468" text-anchor="middle" class="caption">selector replaces explicit graph edges</text>

  <rect x="460" y="340" width="380" height="150" class="box"/>
  <text x="650" y="362" text-anchor="middle" class="head">failure modes</text>
  <text x="650" y="384" text-anchor="middle" class="small">hot speaker (one agent dominates)</text>
  <text x="650" y="402" text-anchor="middle" class="small">sycophancy cascade (defer to loud)</text>
  <text x="650" y="420" text-anchor="middle" class="small">context bloat (pool grows unbounded)</text>
  <text x="650" y="440" text-anchor="middle" class="small">selector inconsistency (LLM non-determinism)</text>
  <text x="650" y="468" text-anchor="middle" class="caption">cap rounds · track balance · scope views</text>
</svg>
