<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .label { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
      .content { font-size: 11px; fill: #333; font-family: 'Menlo', monospace; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 15px; font-weight: 700; fill: #1a1a1a; }
      .tag { font-size: 10px; fill: #c0392b; font-weight: 600; }
    </style>
  </defs>

  <text x="440" y="26" text-anchor="middle" class="title">three defensive layers — detection + watermarking + provenance</text>

  <rect x="20" y="55" width="270" height="170" class="box"/>
  <text x="155" y="78" text-anchor="middle" class="label">A. anti-spoof detection</text>
  <text x="155" y="96" text-anchor="middle" class="tag">ASVspoof 5 · AASIST · RawNet2</text>
  <text x="35" y="124" class="content">input audio  →  classifier</text>
  <text x="35" y="142" class="content">output: "real" or "synthetic"</text>
  <text x="35" y="162" class="content">EER 0.42% on ASVspoof 2019 LA</text>
  <text x="35" y="180" class="content">EER 7.23% on ASVspoof 5 (real-world)</text>
  <text x="35" y="208" class="caption">handles uncooperative adversaries</text>

  <rect x="305" y="55" width="270" height="170" class="hot"/>
  <text x="440" y="78" text-anchor="middle" class="label">B. audio watermarking</text>
  <text x="440" y="96" text-anchor="middle" class="tag">AudioSeal · WaveVerify</text>
  <text x="320" y="124" class="content">generator embeds signal</text>
  <text x="320" y="142" class="content">detector extracts payload</text>
  <text x="320" y="162" class="content">16-bit payload per clip</text>
  <text x="320" y="180" class="content">survives MP3 / EQ / noise</text>
  <text x="320" y="208" class="caption">&gt; 99% bit accuracy pre-attack</text>

  <rect x="590" y="55" width="270" height="170" class="box"/>
  <text x="725" y="78" text-anchor="middle" class="label">C. provenance manifest</text>
  <text x="725" y="96" text-anchor="middle" class="tag">C2PA · CAI</text>
  <text x="605" y="124" class="content">signed JSON manifest</text>
  <text x="605" y="142" class="content">creator · tool · timestamp</text>
  <text x="605" y="162" class="content">cryptographic hash</text>
  <text x="605" y="180" class="content">verifiable off-band</text>
  <text x="605" y="208" class="caption">bypassable by re-encoding → pair with watermark</text>

  <rect x="20" y="245" width="840" height="95" class="box"/>
  <text x="440" y="267" text-anchor="middle" class="label">the gaps each defense has — why you need all three</text>
  <text x="40" y="294" class="content">detection:    degrades OOD; overfits to training-time generators</text>
  <text x="40" y="312" class="content">watermarking: pitch-shift breaks every 2026 watermark (bit acc &lt; 60%)</text>
  <text x="40" y="330" class="content">provenance:   trivially strippable by re-encoding → does nothing alone</text>

  <rect x="20" y="350" width="840" height="105" class="hot"/>
  <text x="440" y="372" text-anchor="middle" class="label">2026 production checklist for any voice-gen deploy</text>
  <text x="40" y="398" class="content">1. AudioSeal embed on every generation (detector shipped in CI)</text>
  <text x="40" y="416" class="content">2. C2PA-sign manifest with model id + user id + timestamp</text>
  <text x="40" y="434" class="content">3. AASIST / RawNet2 detector running on inbound call audio (fraud, replay)</text>
  <text x="40" y="452" class="content">4. audit log + 30-day retention + consent artifact + rate-limit + kill-switch</text>
</svg>
