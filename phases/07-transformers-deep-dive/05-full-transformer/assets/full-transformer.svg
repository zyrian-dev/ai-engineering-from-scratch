<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .norm { fill: #e7edd9; stroke: #1a1a1a; stroke-width: 1; }
      .ffn { fill: #d7e3ee; stroke: #1a1a1a; stroke-width: 1; }
      .label { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
      .content { font-size: 12px; fill: #333; font-family: 'Menlo', monospace; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="450" y="30" text-anchor="middle" class="title">encoder block vs decoder block — the 2026 skeleton</text>

  <!-- Encoder column -->
  <rect x="40" y="60" width="360" height="450" class="box"/>
  <text x="220" y="85" text-anchor="middle" class="label">encoder block (bidirectional)</text>

  <rect x="140" y="110" width="160" height="32" class="hot"/>
  <text x="220" y="131" text-anchor="middle" class="content">input x  (N, d)</text>

  <line x1="220" y1="142" x2="220" y2="165" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="140" y="165" width="160" height="28" class="norm"/>
  <text x="220" y="184" text-anchor="middle" class="content">RMSNorm</text>

  <line x1="220" y1="193" x2="220" y2="215" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="110" y="215" width="220" height="32" class="hot"/>
  <text x="220" y="236" text-anchor="middle" class="content">multi-head self-attention</text>

  <line x1="220" y1="247" x2="220" y2="272" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <circle cx="220" cy="288" r="12" fill="#fff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="220" y="293" text-anchor="middle" class="content">+</text>

  <!-- residual arc -->
  <path d="M 140 126 Q 60 126 60 288 Q 60 288 207 288" fill="none" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="50" y="200" class="caption">residual</text>

  <line x1="220" y1="302" x2="220" y2="325" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="140" y="325" width="160" height="28" class="norm"/>
  <text x="220" y="344" text-anchor="middle" class="content">RMSNorm</text>

  <line x1="220" y1="353" x2="220" y2="376" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="110" y="376" width="220" height="32" class="ffn"/>
  <text x="220" y="397" text-anchor="middle" class="content">SwiGLU FFN</text>

  <line x1="220" y1="408" x2="220" y2="432" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <circle cx="220" cy="448" r="12" fill="#fff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="220" y="453" text-anchor="middle" class="content">+</text>

  <path d="M 140 289 Q 60 289 60 448 Q 60 448 207 448" fill="none" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="4,3"/>

  <line x1="220" y1="462" x2="220" y2="482" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="140" y="482" width="160" height="22" class="hot"/>
  <text x="220" y="498" text-anchor="middle" class="content">out (N, d)</text>

  <!-- Decoder column -->
  <rect x="450" y="60" width="410" height="450" class="box"/>
  <text x="655" y="85" text-anchor="middle" class="label">decoder block (causal + cross-attn)</text>

  <rect x="560" y="110" width="190" height="32" class="hot"/>
  <text x="655" y="131" text-anchor="middle" class="content">input x  (M, d)</text>

  <line x1="655" y1="142" x2="655" y2="160" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="560" y="160" width="190" height="24" class="norm"/>
  <text x="655" y="177" text-anchor="middle" class="content">RMSNorm</text>

  <line x1="655" y1="184" x2="655" y2="202" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="530" y="202" width="250" height="30" class="hot"/>
  <text x="655" y="222" text-anchor="middle" class="content">masked self-attention</text>

  <line x1="655" y1="232" x2="655" y2="250" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <circle cx="655" cy="264" r="10" fill="#fff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="655" y="268" text-anchor="middle" class="content">+</text>

  <line x1="655" y1="274" x2="655" y2="292" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="560" y="292" width="190" height="24" class="norm"/>
  <text x="655" y="309" text-anchor="middle" class="content">RMSNorm</text>

  <line x1="655" y1="316" x2="655" y2="334" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="520" y="334" width="270" height="30" class="hot"/>
  <text x="655" y="354" text-anchor="middle" class="content">cross-attention (Q:dec, KV:enc)</text>

  <!-- arrow in from encoder -->
  <line x1="400" y1="349" x2="520" y2="349" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="440" y="340" class="caption">enc_out</text>

  <line x1="655" y1="364" x2="655" y2="380" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <circle cx="655" cy="394" r="10" fill="#fff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="655" y="398" text-anchor="middle" class="content">+</text>

  <line x1="655" y1="404" x2="655" y2="420" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="560" y="420" width="190" height="24" class="norm"/>
  <text x="655" y="437" text-anchor="middle" class="content">RMSNorm</text>

  <line x1="655" y1="444" x2="655" y2="458" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="560" y="458" width="190" height="24" class="ffn"/>
  <text x="655" y="475" text-anchor="middle" class="content">SwiGLU FFN</text>

  <line x1="655" y1="482" x2="655" y2="495" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="655" cy="502" r="8" fill="#fff" stroke="#1a1a1a" stroke-width="1"/>

  <text x="450" y="544" text-anchor="middle" class="caption">encoder: 2 sublayers per block. decoder: 3 sublayers per block. residuals are dashed, additions are circles.</text>
</svg>
