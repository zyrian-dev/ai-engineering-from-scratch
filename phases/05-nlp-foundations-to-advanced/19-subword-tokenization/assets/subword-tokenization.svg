<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .label { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
      .content { font-size: 12px; fill: #333; font-family: 'Menlo', monospace; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="450" y="30" text-anchor="middle" class="title">three algorithms, same token budget</text>

  <!-- BPE column -->
  <rect x="40" y="60" width="260" height="360" class="box"/>
  <text x="170" y="85" text-anchor="middle" class="label">BPE — greedy merge</text>

  <rect x="60" y="105" width="220" height="30" class="hot"/>
  <text x="170" y="125" text-anchor="middle" class="content">l o w e r</text>

  <text x="170" y="155" text-anchor="middle" class="caption">merge most frequent pair</text>
  <line x1="170" y1="162" x2="170" y2="180" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="185" width="220" height="30" class="box"/>
  <text x="170" y="205" text-anchor="middle" class="content">lo w e r</text>

  <line x1="170" y1="222" x2="170" y2="240" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="245" width="220" height="30" class="box"/>
  <text x="170" y="265" text-anchor="middle" class="content">low er</text>

  <line x1="170" y1="282" x2="170" y2="300" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="305" width="220" height="30" class="box"/>
  <text x="170" y="325" text-anchor="middle" class="content">lower</text>

  <text x="170" y="365" text-anchor="middle" class="caption">used by: GPT, Llama, Gemma,</text>
  <text x="170" y="382" text-anchor="middle" class="caption">Qwen, Mistral</text>
  <text x="170" y="405" text-anchor="middle" class="caption">deterministic at inference</text>

  <!-- Unigram column -->
  <rect x="320" y="60" width="260" height="360" class="box"/>
  <text x="450" y="85" text-anchor="middle" class="label">Unigram — probabilistic prune</text>

  <rect x="340" y="105" width="220" height="30" class="box"/>
  <text x="450" y="125" text-anchor="middle" class="content">start: 50k candidates</text>

  <line x1="450" y1="140" x2="450" y2="158" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="340" y="163" width="220" height="50" class="box"/>
  <text x="450" y="182" text-anchor="middle" class="content">score each by unigram p</text>
  <text x="450" y="200" text-anchor="middle" class="content">prune lowest-loss tokens</text>

  <line x1="450" y1="220" x2="450" y2="238" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="340" y="243" width="220" height="30" class="box"/>
  <text x="450" y="263" text-anchor="middle" class="content">repeat to target size</text>

  <line x1="450" y1="280" x2="450" y2="298" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="340" y="303" width="220" height="32" class="hot"/>
  <text x="450" y="324" text-anchor="middle" class="content">"lower" → {lo+wer, l+ower, low+er}</text>

  <text x="450" y="365" text-anchor="middle" class="caption">used by: T5, Gemma, mBART,</text>
  <text x="450" y="382" text-anchor="middle" class="caption">ALBERT, XLNet</text>
  <text x="450" y="405" text-anchor="middle" class="caption">samplable (subword regularization)</text>

  <!-- WordPiece column -->
  <rect x="600" y="60" width="260" height="360" class="box"/>
  <text x="730" y="85" text-anchor="middle" class="label">WordPiece — max likelihood</text>

  <rect x="620" y="105" width="220" height="30" class="hot"/>
  <text x="730" y="125" text-anchor="middle" class="content">l ##o ##w ##e ##r</text>

  <line x1="730" y1="140" x2="730" y2="158" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="620" y="163" width="220" height="50" class="box"/>
  <text x="730" y="182" text-anchor="middle" class="content">merge pair that maximizes</text>
  <text x="730" y="200" text-anchor="middle" class="content">P(ab) / (P(a)·P(b))</text>

  <line x1="730" y1="220" x2="730" y2="238" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="620" y="243" width="220" height="30" class="box"/>
  <text x="730" y="263" text-anchor="middle" class="content">l ##ow ##er</text>

  <line x1="730" y1="280" x2="730" y2="298" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="620" y="303" width="220" height="30" class="box"/>
  <text x="730" y="323" text-anchor="middle" class="content">l ##ower</text>

  <text x="730" y="365" text-anchor="middle" class="caption">used by: BERT, DistilBERT,</text>
  <text x="730" y="382" text-anchor="middle" class="caption">ELECTRA</text>
  <text x="730" y="405" text-anchor="middle" class="caption">## marks continuation</text>

  <text x="450" y="450" text-anchor="middle" class="caption">tokenize once, ship forever — vocabulary is frozen at training time</text>
</svg>
