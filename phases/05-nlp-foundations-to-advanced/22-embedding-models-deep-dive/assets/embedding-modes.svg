<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .label { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
      .content { font-size: 11px; fill: #333; font-family: 'Menlo', monospace; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .dim { fill: #999; font-size: 10px; font-family: 'Menlo', monospace; }
    </style>
  </defs>

  <text x="450" y="30" text-anchor="middle" class="title">three embedding modes — same passage, three vectors</text>

  <!-- Input passage -->
  <rect x="40" y="55" width="820" height="40" class="box"/>
  <text x="450" y="80" text-anchor="middle" class="content">"Apple released the first iPhone on June 29, 2007."</text>

  <!-- Dense column -->
  <rect x="40" y="115" width="260" height="260" class="box"/>
  <text x="170" y="140" text-anchor="middle" class="label">dense</text>
  <text x="170" y="160" text-anchor="middle" class="caption">one vector, fixed size</text>

  <rect x="60" y="180" width="220" height="30" class="hot"/>
  <text x="170" y="200" text-anchor="middle" class="content">[0.23, -0.11, ..., 0.08]</text>
  <text x="170" y="225" text-anchor="middle" class="dim">dim = 1024 (BGE-M3)</text>

  <text x="170" y="260" text-anchor="middle" class="caption">cosine similarity ranks</text>
  <text x="170" y="278" text-anchor="middle" class="caption">passages by meaning</text>
  <text x="170" y="310" text-anchor="middle" class="label">Matryoshka option:</text>
  <text x="170" y="328" text-anchor="middle" class="content">truncate to 256 dim</text>
  <text x="170" y="346" text-anchor="middle" class="content">≈ 1% accuracy loss</text>
  <text x="170" y="364" text-anchor="middle" class="content">6x storage savings</text>

  <!-- Sparse column -->
  <rect x="320" y="115" width="260" height="260" class="box"/>
  <text x="450" y="140" text-anchor="middle" class="label">sparse (SPLADE-style)</text>
  <text x="450" y="160" text-anchor="middle" class="caption">one weight per vocab token</text>

  <rect x="340" y="180" width="220" height="30" class="hot"/>
  <text x="450" y="200" text-anchor="middle" class="content">{iPhone: 2.1, Apple: 1.8, ...}</text>
  <text x="450" y="225" text-anchor="middle" class="dim">mostly zeros, |vocab| slots</text>

  <text x="450" y="260" text-anchor="middle" class="caption">learned BM25 —</text>
  <text x="450" y="278" text-anchor="middle" class="caption">term weights from transformer</text>
  <text x="450" y="310" text-anchor="middle" class="label">strength:</text>
  <text x="450" y="328" text-anchor="middle" class="content">keyword-heavy queries,</text>
  <text x="450" y="346" text-anchor="middle" class="content">named entities,</text>
  <text x="450" y="364" text-anchor="middle" class="content">rare terms</text>

  <!-- Multi-vector column -->
  <rect x="600" y="115" width="260" height="260" class="box"/>
  <text x="730" y="140" text-anchor="middle" class="label">multi-vector (ColBERT)</text>
  <text x="730" y="160" text-anchor="middle" class="caption">one vector per token</text>

  <rect x="620" y="180" width="220" height="30" class="hot"/>
  <text x="730" y="200" text-anchor="middle" class="content">[v_Apple, v_released, ...]</text>
  <text x="730" y="225" text-anchor="middle" class="dim">(n_tokens, 128)</text>

  <text x="730" y="260" text-anchor="middle" class="caption">MaxSim: for each q-token</text>
  <text x="730" y="278" text-anchor="middle" class="caption">take best d-token match</text>
  <text x="730" y="310" text-anchor="middle" class="label">tradeoff:</text>
  <text x="730" y="328" text-anchor="middle" class="content">larger index,</text>
  <text x="730" y="346" text-anchor="middle" class="content">better recall on long</text>
  <text x="730" y="364" text-anchor="middle" class="content">and specialized queries</text>

  <text x="450" y="405" text-anchor="middle" class="caption">BGE-M3 emits all three from one forward pass — fuse with weighted sum or RRF</text>
</svg>
